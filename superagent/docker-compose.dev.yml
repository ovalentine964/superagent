# ============================================================
# SUPERAGENT — Development Docker Compose
# Hot-reload, debug ports, relaxed resource limits
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: superagent-dev
    ports:
      - "8000:8000"
      - "5678:5678"  # debugpy remote debug port
    environment:
      - APP_ENV=development
      - APP_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_URL=http://chromadb:8000
      - DATABASE_URL=sqlite:///app/data/superagent.db
      - LOG_LEVEL=DEBUG
      - DEBUG=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-sk-placeholder}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-placeholder}
      - SECRET_KEY=dev-secret-key-not-for-production
    volumes:
      - .:/app
      - dev-data:/app/data
    working_dir: /app
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0 --port 8000 --reload
      --log-level debug
    depends_on:
      - redis
      - chromadb
    networks:
      - superagent-dev

  redis:
    image: redis:7-alpine
    container_name: superagent-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - superagent-dev

  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: superagent-chromadb-dev
    ports:
      - "8100:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma-dev-data:/chroma/chroma
    networks:
      - superagent-dev

volumes:
  dev-data:
  chroma-dev-data:

networks:
  superagent-dev:
    driver: bridge
