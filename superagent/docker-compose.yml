version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: superagent-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - CHROMADB_HOST=chromadb
      - DATABASE_URL=sqlite:///./data/superagent.db
    volumes:
      - superagent-data:/app/data
      - superagent-workspace:/app/workspace
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - superagent-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: superagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - superagent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  chromadb:
    image: chromadb/chroma:latest
    container_name: superagent-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    networks:
      - superagent-net
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

volumes:
  superagent-data:
  superagent-workspace:
  redis-data:
  chromadb-data:

networks:
  superagent-net:
    driver: bridge
