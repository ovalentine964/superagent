services:
  - type: web
    name: superagent
    runtime: docker
    repo: https://github.com/ovalentine964/superagent
    branch: main
    dockerfilePath: ./Dockerfile.superagent
    healthCheckPath: /health
    plan: free
    region: oregon
    numInstances: 1
    autoDeploy: yes
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: API_SERVER_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
